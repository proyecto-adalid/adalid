annotation.processing.enabled=true
annotation.processing.enabled.in.editor=false
annotation.processing.processors.list=
annotation.processing.run.all.processors=true
annotation.processing.source.output=${build.generated.sources.dir}/ap-source-output
application.name=adalid-xmi
application.title=Adalid XMI Interface Library
application.vendor=Carlos Medina
application.version=1.0
build.classes.dir=${build.dir}/classes
build.classes.excludes=**/*.java,**/*.form
# This directory is removed when the project is cleaned:
build.dir=build
build.generated.dir=${build.dir}/generated
build.generated.sources.dir=${build.dir}/generated-sources
# Only compile against the classpath explicitly listed here:
build.sysclasspath=ignore
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results
# Uncomment to specify the preferred debugger connection transport:
#debug.transport=dt_socket
debug.classpath=\
    ${run.classpath}
debug.test.classpath=\
    ${run.test.classpath}
# This directory is removed when the project is cleaned:
dist.dir=dist
dist.jar=${dist.dir}/adalid-xmi.jar
dist.javadoc.dir=${dist.dir}/javadoc
endorsed.classpath=
excludes=
includes=**
jar.archive.disabled=${jnlp.enabled}
jar.compress=false
jar.index=${jnlp.enabled}
javac.classpath=\
    ${reference.adalid-commons.jar}:\
    ${reference.adalid-core.jar}:\
    ${reference.adalid-jaas.jar}:\
    ${reference.adalid-jee1.jar}:\
    ${reference.adalid-meta.jar}:\
    ${reference.adalid-oracle.jar}:\
    ${reference.adalid-prime.jar}:\
    ${reference.adalid-util.jar}:\
    ${libs.adalid-ant-lib.classpath}
# Space-separated list of extra javac options
javac.compilerargs=-version
javac.deprecation=true
javac.external.vm=false
javac.processorpath=\
    ${javac.classpath}
javac.source=1.8
javac.target=1.8
javac.test.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}
javac.test.processorpath=\
    ${javac.test.classpath}
javadoc.additionalparam=-Xdoclint:none -Xmaxwarns 1
javadoc.author=true
javadoc.encoding=${source.encoding}
javadoc.noindex=false
javadoc.nonavbar=false
javadoc.notree=false
javadoc.private=false
javadoc.splitindex=true
javadoc.use=true
javadoc.version=true
javadoc.windowtitle=Adalid XMI Interface Library
jnlp.codebase.type=no.codebase
jnlp.descriptor=application
jnlp.enabled=false
jnlp.mixed.code=default
jnlp.offline-allowed=false
jnlp.signed=false
jnlp.signing=
jnlp.signing.alias=
jnlp.signing.keystore=
manifest.file=MANIFEST.MF
meta.inf.dir=${src.dir}/META-INF
mkdist.disabled=true
platform.active=default_platform
project.adalid-commons=../adalid-commons
project.adalid-core=../adalid-core
project.adalid-jaas=../adalid-jaas
project.adalid-jee1=../adalid-jee1
project.adalid-meta=../adalid-meta
project.adalid-oracle=../adalid-oracle
project.adalid-prime=../adalid-prime
project.adalid-util=../adalid-util
reference.adalid-commons.jar=${project.adalid-commons}/dist/adalid-commons.jar
reference.adalid-core.jar=${project.adalid-core}/dist/adalid-core.jar
reference.adalid-jaas.jar=${project.adalid-jaas}/dist/adalid-jaas.jar
reference.adalid-jee1.jar=${project.adalid-jee1}/dist/adalid-jee1.jar
reference.adalid-meta.jar=${project.adalid-meta}/dist/adalid-meta.jar
reference.adalid-oracle.jar=${project.adalid-oracle}/dist/adalid-oracle.jar
reference.adalid-prime.jar=${project.adalid-prime}/dist/adalid-prime.jar
reference.adalid-util.jar=${project.adalid-util}/dist/adalid-util.jar
run.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}
# Space-separated list of JVM arguments used when running the project
# (you may also define separate properties like run-sys-prop.name=value instead of -Dname=value
# or test-sys-prop.name=value to set system properties for unit tests):
run.jvmargs=
run.test.classpath=\
    ${javac.test.classpath}:\
    ${build.test.classes.dir}
source.encoding=UTF-8
src.dir=src
srx.dir=srx
test.src.dir=test
