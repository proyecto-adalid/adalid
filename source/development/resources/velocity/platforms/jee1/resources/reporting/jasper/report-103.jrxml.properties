for-each = entity.operation
entity.getter = getEntitiesList
entity.predicate = adalid.core.predicates.IsPersistentEntity
entity.comparator = adalid.core.comparators.ByEntityName
operation.getter = getOperationsList
operation.predicate = adalid.core.predicates.IsReportOperationWithChartableView
operation.comparator = adalid.core.comparators.ByOperationName
template = templates/jee1/resources/reporting/jasper/report-103.jrxml.vm
path = ${managementFolderPath}/resources/reporting
package = jasper/reports/entity-list
file = ${entity.wrapper.sqlName}.${operation.wrapper.sqlName}.grafico.jrxml
ColorUtils.class = adalid.commons.util.ColorUtils
SelectOption.class = adalid.core.enums.SelectOption
ViewFieldAggregation.class = adalid.core.enums.ViewFieldAggregation
