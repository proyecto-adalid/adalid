for-each = entity
entity.getter = getEntitiesList
entity.predicate = adalid.core.predicates.IsPersistentEntity
entity.comparator = adalid.core.comparators.ByEntityName
template = templates/jee1/lib/base/java/persistence/EntityBase.java.vm
path = ${libProjectFolderPath}/${libJavaSourcesFolder}
package = ${project.rootPackageName}.lib.base.persistence.entity
file = ${entity.wrapper.javaClassName}Base.java
oneToOneFieldNameSuffix.string =
oneToManyFieldClassName.string = java.util.Collection
oneToManyFieldNameSuffix.string = Collection
referencingFieldNameConnective.string = By
baseEntityPackage.string = ${project.rootPackageName}.lib.base.persistence.entity
baseFacadePackage.string = ${project.rootPackageName}.lib.base.persistence.facade
