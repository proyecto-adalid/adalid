for-each = entity
entity.getter = getEntitiesList
entity.predicate = adalid.core.predicates.IsPersistentEntity
entity.comparator = adalid.core.comparators.ByEntityName
template = templates/jee1/lib/base/java/entities/EntityConstants.java.vm
path = ${libProjectFolderPath}/${libJavaSourcesFolder}
package = ${project.rootPackageName}.lib.base.entity.constant
file = ${entity.wrapper.javaClassName}Constants.java
#
# crud operation keys
#
selectOperationKey.string = $Operation.getSelectOperationKey()
insertOperationKey.string = $Operation.getInsertOperationKey()
updateOperationKey.string = $Operation.getUpdateOperationKey()
deleteOperationKey.string = $Operation.getDeleteOperationKey()
